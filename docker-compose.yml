version: '3.8'

services:
  app:
    build: 
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: datawyrd_app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
      - redis

  db:
    image: mysql:8.0
    container_name: datawyrd_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: datawyrd
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: datawyrd_user
      MYSQL_PASSWORD: datawyrd_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: datawyrd_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  db_data:
